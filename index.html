<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moyra — Photography & Videography</title>
  <meta name="description" content="Moyra Photography & Videography" />

  <!-- ============================================================
       CARA EDIT:
       1. NAMA STUDIO  → cari <h1 class="name">Moyra</h1>
       2. TAGLINE      → cari <p class="tagline">
       3. LINK & URL   → cari bagian nav.links di bawah
       4. BACKGROUND   → ganti 'background.jpg' di CSS .bg
       5. LOGO         → ganti src="logo.png" di tag <img>
       6. OVERLAY      → cari rgba(0,0,0,0.52) untuk gelap/terang
       ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      background: #0e0e0e;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ─────────────────────────────────────────────
       Ganti 'background.jpg' dengan nama file foto kamu.        */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('background.jpg'); /* <-- GANTI DI SINI */
      background-size: cover;
      background-position: center;
      z-index: 0;
      animation: bgZoom 18s ease-in-out infinite alternate;
    }
    @keyframes bgZoom {
      from { transform: scale(1);    }
      to   { transform: scale(1.06); }
    }

    /* Overlay gelap — ubah angka terakhir 0.52 untuk lebih gelap/terang */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
    }

    /* ── PARTIKEL BOKEH ─────────────────────────────────────────
       Titik cahaya melayang di background, seperti bokeh kamera */
    .bokeh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bokeh span {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0.6); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 2.5rem;
    }

    /* ── LOGO ───────────────────────────────────────────────── */
    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.3rem;
      overflow: hidden;
      opacity: 0;
      animation: fadeDown 0.9s 0.1s cubic-bezier(.22,1,.36,1) forwards,
                 logoGlow 4s 1.5s ease-in-out infinite alternate;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes logoGlow {
      from { box-shadow: 0 0 0px rgba(255,255,255,0); border-color: rgba(255,255,255,0.3); }
      to   { box-shadow: 0 0 18px rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.55); }
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
    }
    .logo-wrap svg {
      width: 36px; height: 36px;
      color: rgba(255,255,255,0.8);
    }

    /* ── NAMA ───────────────────────────────────────────────── */
    /* Wrapper — hanya untuk fade-in */
    .name-wrap {
      margin-bottom: 0.4rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.22s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* Cahaya menyapu di dalam huruf saja pakai background-clip: text */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-align: center;
      display: block;
      padding: 2px 6px;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.75) 0%,
        rgba(255,255,255,0.75) 30%,
        rgba(255,255,255,1)    48%,
        rgba(255,255,255,1)    52%,
        rgba(255,255,255,0.75) 70%,
        rgba(255,255,255,0.75) 100%
      );
      background-size: 250% 100%;
      background-position: 200% center;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: textSheen 5s 1.8s ease-in-out infinite;
    }
    @keyframes textSheen {
      0%   { background-position: 200% center; }
      45%  { background-position: -80% center; }
      100% { background-position: -80% center; }
    }

    /* ── TAGLINE ─────────────────────────────────────────────── */
    .tagline {
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.48);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.3s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* ── DIVIDER ─────────────────────────────────────────────── */
    .divider {
      height: 0.5px;
      background: rgba(255,255,255,0.2);
      margin-bottom: 1.8rem;
      opacity: 0;
      width: 0;
      animation: expandLine 0.8s 0.4s ease forwards;
    }
    @keyframes expandLine {
      to { width: 32px; opacity: 1; }
    }

    /* ── LINKS ───────────────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border: 0.5px solid rgba(255,255,255,0.22);
      border-radius: 3px;
      text-decoration: none;
      background: rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.2s ease;
    }

    /* Masuk dari bawah satu per satu */
    .link:nth-child(1) { animation: fadeUp 0.7s 0.45s cubic-bezier(.22,1,.36,1) forwards; }
    .link:nth-child(2) { animation: fadeUp 0.7s 0.55s cubic-bezier(.22,1,.36,1) forwards; }
    .link:nth-child(3) { animation: fadeUp 0.7s 0.65s cubic-bezier(.22,1,.36,1) forwards; }
    .link:nth-child(4) { animation: fadeUp 0.7s 0.75s cubic-bezier(.22,1,.36,1) forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Shimmer hover sweep di dalam tombol */
    .link::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transition: left 0.45s ease;
    }
    .link:hover::before { left: 150%; }

    .link:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.5);
      transform: translateX(5px);
    }

    .link:active { transform: translateX(5px) scale(0.98); }

    .link svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
      transition: color 0.2s, transform 0.2s;
    }
    .link:hover svg {
      color: rgba(255,255,255,0.75);
      transform: scale(1.1);
    }

    .link-label {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }
      50%     { transform: scale(1.5); opacity: 1; }
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .footer {
      margin-top: 2rem;
      font-size: 9px;
      font-weight: 200;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.9s 0.9s ease forwards;
    }

    /* ── REDUCED MOTION ─────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .bg, .logo-wrap, .link::before { animation: none; }
      .card, .logo-wrap, .name-wrap, .name, .tagline, .divider, .link, .footer {
        opacity: 1; animation: none;
      }
      .name { background-position: center; }
      .link { transition: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Bokeh particles — dibuat via JS -->
  <div class="bokeh" id="bokeh"></div>

  <main class="card">

    <!-- LOGO: pastikan logo.png ada di folder yang sama.
         Jika tidak ada, monogram SVG tampil otomatis. -->
    <div class="logo-wrap">
      <img src="logo.png" alt="Logo Moyra"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M10 30 Q10 10 20 10 Q30 10 30 20 Q30 32 18 30"
              stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M20 20 Q28 20 28 28"
              stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- NAMA — ganti teks di sini -->
    <div class="name-wrap">
      <h1 class="name">Moyra</h1>
    </div>

    <!-- TAGLINE — ganti teks di sini -->
    <p class="tagline">Photography &amp; Videography</p>

    <div class="divider"></div>

    <!-- LINKS — ganti href dan label sesuai milikmu -->
    <nav class="links" aria-label="Link sosial media">

      <!-- Link 1: WhatsApp — ganti nomor di href -->
      <a class="link" href="https://wa.me/6282132208008" target="_blank" rel="noopener">
        <span class="link-label">Admin Whatsapp</span>
      </a>

      <!-- Link 2: Portfolio — ganti URL -->
      <a class="link" href="https://www.instagram.com/moyraphotography?igsh=bzdkNjg5bHVmeTJt" target="_blank" rel="noopener">
        <span class="link-label">Portfolio</span>
      </a>

      <!-- Link 3: YouTube — ganti URL channel -->
      <a class="link" href="https://www.youtube.com/channel/UC_4u7CGD0WLS6-QiAdZgsQg" target="_blank" rel="noopener">
        <span class="link-label">YouTube</span>
      </a>

      <!-- Link 4: Google Maps — ganti URL -->
      <a class="link" href="https://maps.app.goo.gl/n7zSDSQRaVxXaabGA" target="_blank" rel="noopener">
        <span class="link-label">Gmaps Studio</span>
      </a>

    </nav>

    
  </main>

  <script>
    /* Bokeh — buat titik-titik cahaya mengambang */
    const bokeh = document.getElementById('bokeh');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      const size = Math.random() * 6 + 3;
      s.style.cssText = [
        'width:'  + size + 'px',
        'height:' + size + 'px',
        'left:'   + Math.random() * 100 + '%',
        'bottom:' + (Math.random() * -20) + '%',
        'animation-duration:' + (Math.random() * 14 + 10) + 's',
        'animation-delay:'    + (Math.random() * 12) + 's',
        'opacity:0'
      ].join(';');
      bokeh.appendChild(s);
    }
  </script>

</body>
</html>
